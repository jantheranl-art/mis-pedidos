<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Pedidos — Zapatos</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f7f6f3;--surface:#ffffff;--surface2:#f0efe9;
    --text:#1a1a18;--text2:#6b6b64;--text3:#a0a099;
    --border:#e2e1da;--border2:#ccccc4;
    --accent:#1a1a18;--accent-fg:#ffffff;
    --success-bg:#eaf3de;--success-fg:#27500a;
    --warn-bg:#faeeda;--warn-fg:#633806;
    --danger-bg:#fcebeb;--danger-fg:#501313;
    --info-bg:#e6f1fb;--info-fg:#0c447c;
    --radius:8px;--radius-lg:12px;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:10}
  .logo{font-size:17px;font-weight:600;letter-spacing:-0.3px;display:flex;align-items:center;gap:8px}
  .logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
  .logo-icon svg{width:18px;height:18px;fill:var(--accent-fg)}
  .header-meta{font-size:12px;color:var(--text3)}

  .container{max-width:960px;margin:0 auto;padding:1.5rem 1rem}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem}
  .stat-num{font-size:22px;font-weight:600;color:var(--text);letter-spacing:-0.5px}
  .stat-label{font-size:11px;color:var(--text2);margin-top:2px}

  .tabs{display:flex;gap:2px;margin-bottom:1.25rem;background:var(--surface2);padding:4px;border-radius:var(--radius-lg);border:1px solid var(--border)}
  .tab{flex:1;padding:8px 10px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);border-radius:var(--radius);transition:all .15s;text-align:center}
  .tab:hover{color:var(--text)}
  .tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}

  .section{display:none}.section.active{display:block}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem}
  .card-title{font-size:15px;font-weight:600;margin-bottom:1rem;color:var(--text)}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .form-grid.cols3{grid-template-columns:1fr 1fr 1fr}
  .form-grid.cols4{grid-template-columns:1fr 1fr 1fr 1fr}
  .form-group{display:flex;flex-direction:column;gap:5px}
  .form-group label{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
  .form-group input,.form-group select,.form-group textarea{
    padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);
    background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;
    transition:border-color .15s;width:100%
  }
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#888}
  .form-group textarea{resize:vertical;min-height:64px}

  .btn{padding:9px 18px;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
  .btn-primary{background:var(--accent);color:var(--accent-fg)}
  .btn-primary:hover{opacity:.85}
  .btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}
  .btn-ghost:hover{background:var(--surface2)}
  .btn-edit{background:transparent;border:1px solid var(--border);color:var(--info-fg);font-size:12px;padding:4px 10px;border-radius:6px;cursor:pointer}
  .btn-edit:hover{background:var(--info-bg)}
  .btn-danger-ghost{background:transparent;border:1px solid var(--border);color:var(--danger-fg);font-size:12px;padding:4px 10px;border-radius:6px;cursor:pointer}
  .btn-danger-ghost:hover{background:var(--danger-bg)}

  .toolbar{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
  .toolbar input{flex:1;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;background:var(--surface);color:var(--text)}
  .toolbar input:focus{outline:none;border-color:#888}
  .toolbar select{padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--surface);color:var(--text)}

  .table-wrap{overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--border)}
  table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface)}
  thead{background:var(--surface2)}
  th{text-align:left;padding:10px 14px;font-weight:600;color:var(--text2);font-size:11px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border-bottom:1px solid var(--border)}
  td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafaf8}

  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
  .b-pend{background:var(--warn-bg);color:var(--warn-fg)}
  .b-sent{background:var(--success-bg);color:var(--success-fg)}
  .b-cancel{background:var(--danger-bg);color:var(--danger-fg)}

  .empty{text-align:center;padding:3rem 1rem;color:var(--text2)}
  .empty-icon{font-size:40px;margin-bottom:.5rem;opacity:.3}

  #toast{position:fixed;bottom:24px;right:24px;background:var(--accent);color:var(--accent-fg);padding:10px 18px;border-radius:var(--radius-lg);font-size:13px;font-weight:500;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;z-index:200}
  #toast.show{opacity:1;transform:translateY(0)}

  .totals-bar{display:flex;gap:16px;padding:10px 14px;background:var(--surface2);border-radius:var(--radius);margin-bottom:8px;font-size:13px;flex-wrap:wrap}
  .totals-bar span{color:var(--text2)}
  .totals-bar strong{color:var(--text)}

  .estado-sel{font-size:11px;padding:3px 6px;border-radius:6px;border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer}
  .action-row{display:flex;gap:4px;align-items:center;flex-wrap:wrap}

  .export-btn{font-size:12px;padding:6px 12px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;color:var(--text2)}
  .export-btn:hover{background:var(--surface2);color:var(--text)}

  /* Photo upload */
  .photo-upload-area{border:2px dashed var(--border2);border-radius:var(--radius-lg);padding:1.5rem;text-align:center;cursor:pointer;transition:border-color .15s;position:relative}
  .photo-upload-area:hover{border-color:#888}
  .photo-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .photo-preview{width:100%;max-height:180px;object-fit:contain;border-radius:var(--radius);margin-top:8px;display:none}
  .photo-thumb{width:48px;height:48px;object-fit:cover;border-radius:6px;border:1px solid var(--border);cursor:pointer}

  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;align-items:center;justify-content:center;padding:1rem}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:620px;max-height:90vh;overflow-y:auto;border:1px solid var(--border)}
  .modal-header{padding:1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .modal-header h3{font-size:16px;font-weight:600}
  .modal-body{padding:1.25rem}
  .modal-footer{padding:1rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
  .btn-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);line-height:1}
  .btn-close:hover{color:var(--text)}

  /* Ganancia badge */
  .ganancia-pos{color:var(--success-fg);font-weight:600}
  .ganancia-neg{color:var(--danger-fg);font-weight:600}

  @media(max-width:640px){
    .stats{grid-template-columns:1fr 1fr}
    .form-grid,.form-grid.cols3,.form-grid.cols4{grid-template-columns:1fr}
    .tabs .tab{font-size:11px;padding:6px 4px}
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2 17c0 1.1.9 2 2 2h16a2 2 0 002-2v-1H2v1zm18-8h-2V7a1 1 0 00-1-1H3a1 1 0 00-1 1v6h18V9z"/></svg>
    </div>
    Mis Pedidos
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="export-btn" onclick="exportCSV()">↓ Exportar CSV</button>
    <span class="header-meta" id="fecha-hoy"></span>
  </div>
</header>

<div class="container">

  <div class="stats">
    <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">Pedidos totales</div></div>
    <div class="stat"><div class="stat-num" id="s-pend">0</div><div class="stat-label">Pendientes</div></div>
    <div class="stat"><div class="stat-num" id="s-rev">$0</div><div class="stat-label">Total ventas</div></div>
    <div class="stat"><div class="stat-num" id="s-gan">$0</div><div class="stat-label">Ganancia estimada</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('pedidos')">📦 Pedidos</button>
    <button class="tab" onclick="showTab('nuevo')">➕ Nuevo pedido</button>
    <button class="tab" onclick="showTab('clientes')">👤 Clientes</button>
  </div>

  <!-- PEDIDOS -->
  <div id="tab-pedidos" class="section active">
    <div class="toolbar">
      <input type="text" id="search-p" placeholder="Buscar por cliente o referencia..." oninput="renderPedidos()">
      <select id="filter-est" onchange="renderPedidos()">
        <option value="">Todos los estados</option>
        <option value="Pendiente">Pendiente</option>
        <option value="Enviado">Enviado</option>
        <option value="Cancelado">Cancelado</option>
      </select>
    </div>
    <div id="pedidos-wrap"></div>
  </div>

  <!-- NUEVO PEDIDO -->
  <div id="tab-nuevo" class="section">
    <div class="card">
      <p class="card-title">Registrar nuevo pedido</p>
      <div class="form-grid">
        <div class="form-group">
          <label>Cliente *</label>
          <select id="n-cliente"><option value="">— Seleccionar cliente —</option></select>
        </div>
        <div class="form-group">
          <label>Referencia / modelo *</label>
          <input type="text" id="n-ref" placeholder="Ej: Nike Air Max negro">
        </div>
      </div>
      <div class="form-grid cols4">
        <div class="form-group">
          <label>Talla</label>
          <input type="text" id="n-talla" placeholder="Ej: 38">
        </div>
        <div class="form-group">
          <label>Color</label>
          <input type="text" id="n-color" placeholder="Ej: Negro">
        </div>
        <div class="form-group">
          <label>Cantidad</label>
          <input type="number" id="n-cant" min="1" value="1" oninput="calcTotal()">
        </div>
        <div class="form-group">
          <label>Fecha de entrega</label>
          <input type="date" id="n-fecha">
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Precio de venta ($) *</label>
          <input type="number" id="n-precio" min="0" placeholder="0" oninput="calcTotal()">
        </div>
        <div class="form-group">
          <label>Precio de costo ($)</label>
          <input type="number" id="n-costo" min="0" placeholder="0" oninput="calcTotal()">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label>Notas</label>
        <textarea id="n-notas" placeholder="Detalles adicionales, dirección de entrega..."></textarea>
      </div>

      <!-- Foto -->
      <div class="form-group" style="margin-bottom:12px">
        <label>Foto del producto</label>
        <div class="photo-upload-area" id="foto-area" onclick="document.getElementById('n-foto').click()">
          <input type="file" id="n-foto" accept="image/*" style="display:none" onchange="previewFoto(this,'foto-preview-new','foto-area-text')">
          <div id="foto-area-text">
            <div style="font-size:28px;margin-bottom:4px">📷</div>
            <div style="font-size:13px;color:var(--text2)">Haz clic para cargar una foto</div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">JPG, PNG, WEBP</div>
          </div>
          <img id="foto-preview-new" class="photo-preview">
        </div>
      </div>

      <div id="total-preview" style="font-size:14px;font-weight:600;padding:10px 14px;background:var(--surface2);border-radius:var(--radius);margin-bottom:12px;display:none"></div>
      <button class="btn btn-primary" onclick="addPedido()">Guardar pedido</button>
    </div>
  </div>

  <!-- CLIENTES -->
  <div id="tab-clientes" class="section">
    <div class="card">
      <p class="card-title">Agregar cliente</p>
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre completo *</label>
          <input type="text" id="c-nombre" placeholder="Nombre del cliente">
        </div>
        <div class="form-group">
          <label>Teléfono / WhatsApp</label>
          <input type="text" id="c-tel" placeholder="Ej: 310 000 0000">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label>Ciudad / dirección</label>
        <input type="text" id="c-dir" placeholder="Ej: Bogotá, Cota...">
      </div>
      <button class="btn btn-primary" onclick="addCliente()">Agregar cliente</button>
    </div>
    <div id="clientes-wrap"></div>
  </div>

</div>

<!-- MODAL EDITAR -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-header">
      <h3>Editar pedido</h3>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Cliente *</label>
          <select id="e-cliente"></select>
        </div>
        <div class="form-group">
          <label>Referencia / modelo *</label>
          <input type="text" id="e-ref">
        </div>
      </div>
      <div class="form-grid cols4">
        <div class="form-group">
          <label>Talla</label>
          <input type="text" id="e-talla">
        </div>
        <div class="form-group">
          <label>Color</label>
          <input type="text" id="e-color">
        </div>
        <div class="form-group">
          <label>Cantidad</label>
          <input type="number" id="e-cant" min="1" oninput="calcTotalEdit()">
        </div>
        <div class="form-group">
          <label>Fecha entrega</label>
          <input type="date" id="e-fecha">
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Precio de venta ($)</label>
          <input type="number" id="e-precio" min="0" oninput="calcTotalEdit()">
        </div>
        <div class="form-group">
          <label>Precio de costo ($)</label>
          <input type="number" id="e-costo" min="0" oninput="calcTotalEdit()">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label>Estado</label>
        <select id="e-estado">
          <option>Pendiente</option>
          <option>Enviado</option>
          <option>Cancelado</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label>Notas</label>
        <textarea id="e-notas"></textarea>
      </div>

      <!-- Foto editar -->
      <div class="form-group" style="margin-bottom:8px">
        <label>Foto del producto</label>
        <div style="display:flex;gap:12px;align-items:flex-start">
          <div>
            <img id="e-foto-preview" style="width:80px;height:80px;object-fit:cover;border-radius:var(--radius);border:1px solid var(--border);display:none">
            <div id="e-foto-placeholder" style="width:80px;height:80px;border-radius:var(--radius);border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--text3)">📷</div>
          </div>
          <div>
            <button class="btn btn-ghost" style="font-size:13px;padding:7px 14px" onclick="document.getElementById('e-foto-input').click()">Cambiar foto</button>
            <input type="file" id="e-foto-input" accept="image/*" style="display:none" onchange="previewFotoEdit(this)">
            <button class="btn btn-ghost" style="font-size:13px;padding:7px 14px;margin-top:6px;color:var(--danger-fg)" onclick="clearFotoEdit()">Quitar foto</button>
          </div>
        </div>
      </div>

      <div id="edit-total-preview" style="font-size:13px;padding:8px 12px;background:var(--surface2);border-radius:var(--radius);margin-top:8px;display:none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEdit()">Guardar cambios</button>
    </div>
  </div>
</div>

<!-- MODAL VER FOTO -->
<div class="modal-overlay" id="modal-foto" onclick="document.getElementById('modal-foto').classList.remove('open')">
  <div style="max-width:500px;width:100%">
    <img id="modal-foto-img" style="width:100%;border-radius:var(--radius-lg);display:block">
  </div>
</div>

<div id="toast"></div>

<script>
let pedidos = JSON.parse(localStorage.getItem('mzp_pedidos')||'[]');
let clientes = JSON.parse(localStorage.getItem('mzp_clientes')||'[]');
let editIdx = -1;
let editFotoData = null;

function save(){
  localStorage.setItem('mzp_pedidos', JSON.stringify(pedidos));
  localStorage.setItem('mzp_clientes', JSON.stringify(clientes));
}

let toastTimer;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}

function showTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>{
    b.classList.toggle('active',['pedidos','nuevo','clientes'][i]===t);
  });
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='nuevo') populateClienteSelect('n-cliente');
  if(t==='clientes') renderClientes();
  if(t==='pedidos') renderPedidos();
}

function updateStats(){
  document.getElementById('s-total').textContent=pedidos.length;
  document.getElementById('s-pend').textContent=pedidos.filter(p=>p.estado==='Pendiente').length;
  const venta=pedidos.reduce((a,p)=>a+(parseFloat(p.precio||0)*parseInt(p.cantidad||1)),0);
  const costo=pedidos.reduce((a,p)=>a+(parseFloat(p.costo||0)*parseInt(p.cantidad||1)),0);
  const gan=venta-costo;
  document.getElementById('s-rev').textContent='$'+venta.toLocaleString('es-CO');
  const ganEl=document.getElementById('s-gan');
  ganEl.textContent='$'+gan.toLocaleString('es-CO');
  ganEl.style.color=gan>=0?'var(--success-fg)':'var(--danger-fg)';
}

// ─── Render pedidos ──────────────────────────────────────
function renderPedidos(){
  const q=(document.getElementById('search-p').value||'').toLowerCase();
  const est=document.getElementById('filter-est').value;
  let list=pedidos.filter(p=>{
    const ok=!q||(p.cliente||'').toLowerCase().includes(q)||(p.ref||'').toLowerCase().includes(q);
    return ok&&(!est||p.estado===est);
  });
  const wrap=document.getElementById('pedidos-wrap');
  if(!list.length){
    wrap.innerHTML='<div class="empty"><div class="empty-icon">📦</div>Sin pedidos que mostrar.<br><small>Agrega tu primer pedido desde la pestaña "Nuevo pedido".</small></div>';
    return;
  }
  // totals bar
  const totalV=list.reduce((a,p)=>a+(parseFloat(p.precio||0)*parseInt(p.cantidad||1)),0);
  const totalC=list.reduce((a,p)=>a+(parseFloat(p.costo||0)*parseInt(p.cantidad||1)),0);
  const gan=totalV-totalC;

  wrap.innerHTML=`
  <div class="totals-bar">
    <span>Mostrando <strong>${list.length}</strong> pedido${list.length!==1?'s':''}</span>
    <span>Ventas: <strong>$${totalV.toLocaleString('es-CO')}</strong></span>
    <span>Costo: <strong>$${totalC.toLocaleString('es-CO')}</strong></span>
    <span>Ganancia: <strong class="${gan>=0?'ganancia-pos':'ganancia-neg'}">$${gan.toLocaleString('es-CO')}</strong></span>
  </div>
  <div class="table-wrap"><table>
    <thead><tr>
      <th></th><th>Cliente</th><th>Referencia</th><th>Talla</th><th>Color</th>
      <th>Cant</th><th>Venta</th><th>Costo</th><th>Ganancia</th><th>Entrega</th><th>Estado</th><th>Acciones</th>
    </tr></thead>
    <tbody>${list.map(p=>{
      const idx=pedidos.indexOf(p);
      const venta=parseFloat(p.precio||0)*parseInt(p.cantidad||1);
      const costo=parseFloat(p.costo||0)*parseInt(p.cantidad||1);
      const g=venta-costo;
      const badge=p.estado==='Pendiente'?'b-pend':p.estado==='Enviado'?'b-sent':'b-cancel';
      const fecha=p.fecha?new Date(p.fecha+'T12:00:00').toLocaleDateString('es-CO',{day:'2-digit',month:'short'}):'—';
      const fotoHtml=p.foto?`<img src="${p.foto}" class="photo-thumb" onclick="verFoto('${idx}')" title="Ver foto">`:
        `<div style="width:48px;height:48px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text3)">📷</div>`;
      return `<tr>
        <td>${fotoHtml}</td>
        <td><strong>${p.cliente}</strong>${p.notas?`<br><small style="color:var(--text3);max-width:120px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.notas}</small>`:''}</td>
        <td>${p.ref}</td><td>${p.talla||'—'}</td><td>${p.color||'—'}</td>
        <td>${p.cantidad}</td>
        <td>$${venta.toLocaleString('es-CO')}</td>
        <td style="color:var(--text2)">${p.costo?'$'+costo.toLocaleString('es-CO'):'—'}</td>
        <td class="${g>=0?'ganancia-pos':'ganancia-neg'}">${p.costo?'$'+g.toLocaleString('es-CO'):'—'}</td>
        <td>${fecha}</td>
        <td><span class="badge ${badge}">${p.estado}</span></td>
        <td class="action-row">
          <select class="estado-sel" onchange="changeEstado(${idx},this.value)">
            <option${p.estado==='Pendiente'?' selected':''}>Pendiente</option>
            <option${p.estado==='Enviado'?' selected':''}>Enviado</option>
            <option${p.estado==='Cancelado'?' selected':''}>Cancelado</option>
          </select>
          <button class="btn-edit" onclick="openEdit(${idx})">✏️ Editar</button>
          <button class="btn-danger-ghost" onclick="delPedido(${idx})">✕</button>
        </td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function changeEstado(idx,val){pedidos[idx].estado=val;save();renderPedidos();updateStats();toast('Estado actualizado');}
function delPedido(idx){
  if(!confirm('¿Eliminar este pedido?')) return;
  pedidos.splice(idx,1);save();renderPedidos();updateStats();toast('Pedido eliminado');
}

function verFoto(idx){
  const p=pedidos[parseInt(idx)];
  if(!p||!p.foto) return;
  document.getElementById('modal-foto-img').src=p.foto;
  document.getElementById('modal-foto').classList.add('open');
}

// ─── Edit modal ──────────────────────────────────────────
function openEdit(idx){
  editIdx=idx;
  const p=pedidos[idx];
  populateClienteSelect('e-cliente');
  document.getElementById('e-cliente').value=p.cliente;
  document.getElementById('e-ref').value=p.ref||'';
  document.getElementById('e-talla').value=p.talla||'';
  document.getElementById('e-color').value=p.color||'';
  document.getElementById('e-cant').value=p.cantidad||1;
  document.getElementById('e-fecha').value=p.fecha||'';
  document.getElementById('e-precio').value=p.precio||'';
  document.getElementById('e-costo').value=p.costo||'';
  document.getElementById('e-estado').value=p.estado||'Pendiente';
  document.getElementById('e-notas').value=p.notas||'';
  editFotoData=p.foto||null;
  const prev=document.getElementById('e-foto-preview');
  const ph=document.getElementById('e-foto-placeholder');
  if(p.foto){prev.src=p.foto;prev.style.display='block';ph.style.display='none';}
  else{prev.style.display='none';ph.style.display='flex';}
  calcTotalEdit();
  document.getElementById('modal-edit').classList.add('open');
}

function closeModal(){
  document.getElementById('modal-edit').classList.remove('open');
  editIdx=-1;editFotoData=null;
}

function saveEdit(){
  if(editIdx<0) return;
  const cl=document.getElementById('e-cliente').value;
  const ref=document.getElementById('e-ref').value.trim();
  if(!cl||!ref){toast('Completa cliente y referencia');return;}
  pedidos[editIdx]={
    ...pedidos[editIdx],
    cliente:cl,ref,
    talla:document.getElementById('e-talla').value.trim(),
    color:document.getElementById('e-color').value.trim(),
    cantidad:parseInt(document.getElementById('e-cant').value)||1,
    fecha:document.getElementById('e-fecha').value,
    precio:parseFloat(document.getElementById('e-precio').value)||0,
    costo:parseFloat(document.getElementById('e-costo').value)||0,
    estado:document.getElementById('e-estado').value,
    notas:document.getElementById('e-notas').value.trim(),
    foto:editFotoData||null
  };
  save();renderPedidos();updateStats();closeModal();toast('✓ Pedido actualizado');
}

function calcTotalEdit(){
  const c=parseInt(document.getElementById('e-cant').value)||0;
  const p=parseFloat(document.getElementById('e-precio').value)||0;
  const co=parseFloat(document.getElementById('e-costo').value)||0;
  const el=document.getElementById('edit-total-preview');
  if(c&&p){
    const venta=c*p;const costo=c*co;const g=venta-costo;
    el.style.display='block';
    el.innerHTML=`Venta: <strong>$${venta.toLocaleString('es-CO')}</strong> &nbsp;|&nbsp; Costo: <strong>$${costo.toLocaleString('es-CO')}</strong> &nbsp;|&nbsp; Ganancia: <strong class="${g>=0?'ganancia-pos':'ganancia-neg'}">$${g.toLocaleString('es-CO')}</strong>`;
  } else {el.style.display='none';}
}

function previewFotoEdit(input){
  if(!input.files||!input.files[0]) return;
  const reader=new FileReader();
  reader.onload=e=>{
    editFotoData=e.target.result;
    const prev=document.getElementById('e-foto-preview');
    prev.src=editFotoData;prev.style.display='block';
    document.getElementById('e-foto-placeholder').style.display='none';
  };
  reader.readAsDataURL(input.files[0]);
}

function clearFotoEdit(){
  editFotoData=null;
  document.getElementById('e-foto-preview').style.display='none';
  document.getElementById('e-foto-placeholder').style.display='flex';
}

// ─── Nuevo pedido ────────────────────────────────────────
let newFotoData=null;

function populateClienteSelect(selId){
  const sel=document.getElementById(selId);
  const cur=sel.value;
  sel.innerHTML='<option value="">— Seleccionar cliente —</option>'+
    clientes.map(c=>`<option value="${c.nombre}">${c.nombre}</option>`).join('');
  if(cur) sel.value=cur;
}

function previewFoto(input, previewId, textId){
  if(!input.files||!input.files[0]) return;
  const reader=new FileReader();
  reader.onload=e=>{
    newFotoData=e.target.result;
    const img=document.getElementById(previewId);
    img.src=newFotoData;img.style.display='block';
    document.getElementById(textId).style.display='none';
  };
  reader.readAsDataURL(input.files[0]);
}

function calcTotal(){
  const c=parseInt(document.getElementById('n-cant').value)||0;
  const p=parseFloat(document.getElementById('n-precio').value)||0;
  const co=parseFloat(document.getElementById('n-costo').value)||0;
  const el=document.getElementById('total-preview');
  if(c&&p){
    const venta=c*p;const costo=c*co;const g=venta-costo;
    el.style.display='block';
    el.innerHTML=`Venta: <strong>$${venta.toLocaleString('es-CO')}</strong> &nbsp;|&nbsp; Costo: <strong>$${costo.toLocaleString('es-CO')}</strong> &nbsp;|&nbsp; Ganancia: <strong class="${g>=0?'ganancia-pos':'ganancia-neg'}">$${g.toLocaleString('es-CO')}</strong>`;
  } else{el.style.display='none';}
}

function addPedido(){
  const cl=document.getElementById('n-cliente').value;
  const ref=document.getElementById('n-ref').value.trim();
  if(!cl||!ref){toast('Completa cliente y referencia');return;}
  pedidos.unshift({
    cliente:cl,ref,
    talla:document.getElementById('n-talla').value.trim(),
    cantidad:parseInt(document.getElementById('n-cant').value)||1,
    precio:parseFloat(document.getElementById('n-precio').value)||0,
    costo:parseFloat(document.getElementById('n-costo').value)||0,
    color:document.getElementById('n-color').value.trim(),
    fecha:document.getElementById('n-fecha').value,
    notas:document.getElementById('n-notas').value.trim(),
    foto:newFotoData||null,
    estado:'Pendiente',
    id:Date.now()
  });
  save();updateStats();toast('✓ Pedido guardado');
  ['n-ref','n-talla','n-color','n-notas'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('n-cant').value=1;
  document.getElementById('n-precio').value='';
  document.getElementById('n-costo').value='';
  document.getElementById('n-fecha').value='';
  document.getElementById('n-cliente').value='';
  document.getElementById('total-preview').style.display='none';
  document.getElementById('foto-preview-new').style.display='none';
  document.getElementById('foto-area-text').style.display='block';
  document.getElementById('n-foto').value='';
  newFotoData=null;
}

// ─── Clientes ────────────────────────────────────────────
function addCliente(){
  const nombre=document.getElementById('c-nombre').value.trim();
  if(!nombre){toast('Ingresa un nombre');return;}
  if(clientes.find(c=>c.nombre.toLowerCase()===nombre.toLowerCase())){toast('Este cliente ya existe');return;}
  clientes.push({nombre,tel:document.getElementById('c-tel').value.trim(),dir:document.getElementById('c-dir').value.trim()});
  save();
  ['c-nombre','c-tel','c-dir'].forEach(id=>document.getElementById(id).value='');
  renderClientes();toast('✓ Cliente agregado');
}

function renderClientes(){
  const wrap=document.getElementById('clientes-wrap');
  if(!clientes.length){
    wrap.innerHTML='<div class="empty"><div class="empty-icon">👤</div>Sin clientes aún.<br><small>Agrega clientes para poder crear pedidos.</small></div>';
    return;
  }
  wrap.innerHTML=`<div class="table-wrap"><table>
    <thead><tr><th>Nombre</th><th>Teléfono</th><th>Ciudad</th><th>Pedidos</th><th>Total compras</th><th></th></tr></thead>
    <tbody>${clientes.map((c,i)=>{
      const cp=pedidos.filter(p=>p.cliente===c.nombre);
      const total=cp.reduce((a,p)=>a+(parseFloat(p.precio||0)*parseInt(p.cantidad||1)),0);
      return `<tr>
        <td><strong>${c.nombre}</strong></td>
        <td>${c.tel||'—'}</td><td>${c.dir||'—'}</td>
        <td>${cp.length} pedido${cp.length!==1?'s':''}</td>
        <td>$${total.toLocaleString('es-CO')}</td>
        <td><button class="btn-danger-ghost" onclick="delCliente(${i})">✕ Eliminar</button></td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function delCliente(i){
  if(!confirm('¿Eliminar este cliente?')) return;
  clientes.splice(i,1);save();renderClientes();toast('Cliente eliminado');
}

// ─── Export CSV ──────────────────────────────────────────
function exportCSV(){
  if(!pedidos.length){toast('No hay pedidos para exportar');return;}
  const headers=['Cliente','Referencia','Talla','Color','Cantidad','Precio venta','Precio costo','Total venta','Total costo','Ganancia','Fecha entrega','Estado','Notas'];
  const rows=pedidos.map(p=>{
    const v=parseFloat(p.precio||0)*parseInt(p.cantidad||1);
    const c=parseFloat(p.costo||0)*parseInt(p.cantidad||1);
    return [
      p.cliente,p.ref,p.talla||'',p.color||'',p.cantidad,
      p.precio||0,p.costo||0,v.toFixed(0),c.toFixed(0),(v-c).toFixed(0),
      p.fecha||'',p.estado,p.notas||''
    ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv='\uFEFF'+[headers.join(','),...rows].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='pedidos_zapatos_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();toast('CSV descargado');
}

// ─── Init ────────────────────────────────────────────────
document.getElementById('fecha-hoy').textContent=new Date().toLocaleDateString('es-CO',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
updateStats();
renderPedidos();
</script>
